name: Auto Sync and Build Quickshell

on:
  push:
    branches:
      - master
      - root
  schedule:
    - cron: '0 2 * * *' # Every day at 2 AM UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      updated: ${{ steps.sync.outputs.updated }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto Sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/quickshell-mirror/quickshell.git || true
          git fetch upstream master
          OLD_HEAD=$(git rev-parse HEAD)
          git merge upstream/master -m "Auto-merge upstream master"
          NEW_HEAD=$(git rev-parse HEAD)
          if [ "$OLD_HEAD" != "$NEW_HEAD" ]; then
            git push origin HEAD
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: sync
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.sync.outputs.updated == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Build Package in Arch Linux Container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            archlinux:base-devel \
            bash /workspace/build.sh /workspace

      - name: Verify repo database exists
        run: |
          echo "=== Checking repository files ==="
          ls -lh public/x86_64/
          test -f public/x86_64/quickshell.db || { echo "FATAL: quickshell.db missing!"; exit 1; }
          test -f public/x86_64/quickshell.files || { echo "FATAL: quickshell.files missing!"; exit 1; }
          test -f public/x86_64/quickshell.db.tar.gz || { echo "FATAL: quickshell.db.tar.gz missing!"; exit 1; }
          echo "✅ All repository files present"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
          force_orphan: true
